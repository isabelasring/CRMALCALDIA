services:
  espocrm-db:
    image: postgres:16
    container_name: espocrm-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - espocrm-db:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      start_period: 30s
      timeout: 10s
      retries: 5

  espocrm:
    build:
      context: .
      dockerfile: docker/espocrm/Dockerfile
      args:
        # Dokploy inyecta SOURCE_COMMIT; si no, usa DEPLOY_VERSION del Environment.
        DEPLOY_VERSION: ${DEPLOY_VERSION:-local}
        SOURCE_COMMIT: ${SOURCE_COMMIT:-}
    image: crm-alcaldia/espocrm
    entrypoint: ["/usr/local/bin/entrypoint-with-deploy.sh"]
    command: ["apache2-foreground"]
    expose:
      - "80"
    environment:
      ESPOCRM_DATABASE_PLATFORM: Postgresql
      ESPOCRM_DATABASE_HOST: espocrm-db
      ESPOCRM_DATABASE_PORT: "5432"
      ESPOCRM_DATABASE_NAME: ${POSTGRES_DB}
      ESPOCRM_DATABASE_USER: ${POSTGRES_USER}
      ESPOCRM_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      ESPOCRM_ADMIN_USERNAME: ${ESPOCRM_ADMIN_USERNAME}
      ESPOCRM_ADMIN_PASSWORD: ${ESPOCRM_ADMIN_PASSWORD}
      ESPOCRM_SITE_URL: ${ESPOCRM_SITE_URL}
      ESPOCRM_TIME_ZONE: ${ESPOCRM_TIME_ZONE}
      ESPOCRM_WEB_SOCKET_URL: ${ESPOCRM_WEB_SOCKET_URL:-}
      REPO_ROOT: /opt/bootstrap/repo
      ESPO_RUN_AUTO_DEPLOY: "1"
    volumes:
      - espocrm:/var/www/html
    restart: always
    depends_on:
      espocrm-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x apache2 >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 300s
    ports:
      - "8080:80"

  espocrm-daemon:
    image: crm-alcaldia/espocrm
    container_name: espocrm-daemon
    volumes:
      - espocrm:/var/www/html
    restart: always
    entrypoint: docker-daemon.sh
    depends_on:
      - espocrm

  espocrm-websocket:
    image: crm-alcaldia/espocrm
    container_name: espocrm-websocket
    environment:
      ESPOCRM_CONFIG_WEB_SOCKET_ZERO_M_Q_SUBSCRIBER_DSN: "tcp://*:7777"
      ESPOCRM_CONFIG_WEB_SOCKET_ZERO_M_Q_SUBMISSION_DSN: "tcp://espocrm-websocket:7777"
    volumes:
      - espocrm:/var/www/html
    restart: always
    entrypoint: docker-websocket.sh
    ports:
      - "8081:8080"
    depends_on:
      - espocrm

  espocrm-init:
    image: crm-alcaldia/espocrm
    container_name: espocrm-init
    environment:
      REPO_ROOT: /opt/bootstrap/repo
      APP_ROOT: /var/www/html
      ESPOCRM_ADMIN_USERNAME: ${ESPOCRM_ADMIN_USERNAME}
      ESPOCRM_ADMIN_PASSWORD: ${ESPOCRM_ADMIN_PASSWORD}
    volumes:
      - espocrm:/var/www/html
    restart: "no"
    entrypoint:
      - run-custom-init.sh
    depends_on:
      espocrm-db:
        condition: service_healthy
      espocrm:
        condition: service_started

volumes:
  espocrm-db:
  espocrm:
