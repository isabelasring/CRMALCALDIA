# Desarrollo local únicamente. Dokploy usa solo docker-compose.yml.
# Uso: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
services:
  espocrm:
    volumes:
      - ./espocrm-custom:/opt/bootstrap/repo/espocrm-custom:ro
      - ./scripts:/opt/bootstrap/repo/scripts:ro
      - ./formatos:/opt/bootstrap/repo/formatos:ro
      - ./exports:/opt/bootstrap/repo/exports:ro

  espocrm-init:
    volumes:
      - ./espocrm-custom:/opt/bootstrap/repo/espocrm-custom:ro
      - ./scripts:/opt/bootstrap/repo/scripts:ro
      - ./formatos:/opt/bootstrap/repo/formatos:ro
      - ./exports:/opt/bootstrap/repo/exports:ro
